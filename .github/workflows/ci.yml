name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: Triggering CI workflow completion to start migrate-db.yml"'
      continue-on-error: true
    - name: Build
      run: npm run build
      env:
        DATABASE_URL: postgresql://dummy-user:dummy-password@dummy-host:5432/dummy-database
        API_KEY_SECRET: dummy-api-key-secret
        PROVIDER_KEY_SECRET: dummy-provider-key-secret
        NEXTAUTH_SECRET: dummy-nextauth-secret
        NEXTAUTH_URL: http://localhost:8260
        SKIP_ENV_VALIDATION: 'true'
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
    - develop
  pull_request:
    branches:
    - main
    - develop
